name: fy-suites-ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install test dependencies
        run: python -m pip install -U pip pytest jsonschema pyyaml
      - name: Run fy-suites tests
        run: python -m pytest -q

